apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-workflow-deployment
  labels:
    app: document-workflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: document-workflow
  template:
    metadata:
      labels:
        app: document-workflow
    spec:
      containers:
      - name: document-workflow
        image: 23mis0333/document-workflow:latest
        ports:
        - containerPort: 8080
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: document-workflow-service
spec:
  type: NodePort
  selector:
    app: document-workflow
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    nodePort: 30009
